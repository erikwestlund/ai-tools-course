# Student repository export manifest.
#
# The build script reads this file to decide the public target, which days are
# released, and which files must or must not exist after export.

target_root_default: ~/Code/Courses/ai-tools-2026

# Day-level publishing gate for the public/student repo.
# Valid values: preclass, day-01, day-02, day-03, all.
published_days:
  - all

# Student-owned files are ignored by Git and should not be overwritten.
student_work:
  - practice/work/

must_exist_after_export:
  - README.md
  - updater.R
